<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Potato Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #1e293b;
        }
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border: none;
            background: none;
            color: #94a3b8;
            font-size: 1rem;
        }
        .tab.active {
            color: #e2e8f0;
            border-bottom: 2px solid #6366f1;
        }
        .panel { display: none; flex: 1; flex-direction: column; }
        .panel.active { display: flex; }
        #messages, #echo-log {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .msg {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            line-height: 1.4;
        }
        .msg.user { align-self: flex-end; background: #6366f1; }
        .msg.bot { align-self: flex-start; background: #1e293b; }
        .msg.echo { align-self: flex-start; background: #1e293b; font-family: monospace; }
        .input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid #1e293b;
        }
        input {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
        }
        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            background: #6366f1;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #4f46e5; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 0.5rem 1rem; color: #94a3b8; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('chat')">Chat</button>
        <button class="tab" onclick="switchTab('echo')">Live Echo</button>
    </div>

    <!-- Chat panel (existing) -->
    <div id="chat-panel" class="panel active">
        <div id="messages"></div>
        <div class="input-area">
            <input id="msg" type="text" placeholder="Type a message..." autofocus />
            <button id="send">Send</button>
            <button id="bench">Benchmark</button>
        </div>
    </div>

    <!-- Live Echo panel (bidirectional streaming demo) -->
    <div id="echo-panel" class="panel">
        <div id="echo-status" class="status">Not connected</div>
        <div id="echo-log"></div>
        <div class="input-area">
            <input id="echo-input" type="text" placeholder="Type to see live echo..." />
        </div>
    </div>

    <script>
        // --- Tab switching ---
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector('.tab[onclick*="' + name + '"]').classList.add('active');
            document.getElementById(name + '-panel').classList.add('active');
            if (name === 'echo' && !echoCallId) startEcho();
        }

        const messages = document.getElementById('messages');
        const chatInput = document.getElementById('msg');
        const sendBtn = document.getElementById('send');

        function addMessage(text, who, container) {
            container = container || messages;
            const div = document.createElement('div');
            div.className = 'msg ' + who;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        async function streamCall(cmd, stdin, onEvent) {
            const res = await fetch('/_api/calls', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cmd: cmd })
            });
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let callId = null;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                for (const line of lines) {
                    if (!line.startsWith('data:')) continue;
                    const json = line.slice(5).trim();
                    if (!json) continue;
                    try {
                        const msg = JSON.parse(json);
                        if (msg.event === 'started' && msg.data && msg.data.call_id) {
                            callId = msg.data.call_id;
                            if (stdin !== undefined) {
                                fetch('/_api/calls/' + callId + '/stdin', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ data: stdin })
                                });
                            }
                            continue;
                        }
                        onEvent(msg.event || 'output', msg.data);
                    } catch {}
                }
            }
        }

        async function send() {
            const text = chatInput.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            chatInput.value = '';
            sendBtn.disabled = true;
            const botMsg = addMessage('', 'bot');
            let words = [];
            await streamCall(['chat.sh'], { message: text }, function(event, data) {
                if (event === 'output' && data) {
                    words.push(data);
                    botMsg.textContent = words.join(' ');
                    messages.scrollTop = messages.scrollHeight;
                }
            });
            sendBtn.disabled = false;
            chatInput.focus();
        }

        async function benchmark() {
            const benchBtn = document.getElementById('bench');
            benchBtn.disabled = true;
            const statusMsg = addMessage('Benchmarking...', 'bot');
            const rounds = 20;
            let totalFirstWord = 0, totalComplete = 0, totalWords = 0;
            for (let r = 0; r < rounds; r++) {
                const start = performance.now();
                let firstWordTime = 0, wordCount = 0;
                await streamCall(['bench.sh'], {}, function(event, data) {
                    if (event === 'output' && data) {
                        wordCount++;
                        if (firstWordTime === 0) firstWordTime = performance.now() - start;
                    }
                });
                totalFirstWord += firstWordTime;
                totalComplete += performance.now() - start;
                totalWords += wordCount;
                statusMsg.textContent = 'Benchmarking... ' + (r + 1) + '/' + rounds;
            }
            const avgFirst = (totalFirstWord / rounds).toFixed(1);
            const avgComplete = (totalComplete / rounds).toFixed(1);
            const avgPerWord = (totalComplete / totalWords).toFixed(2);
            const wordsPerSec = (totalWords / (totalComplete / 1000)).toFixed(0);
            statusMsg.textContent = rounds + ' rounds, ' + totalWords + ' words | First: ' + avgFirst + 'ms | Complete: ' + avgComplete + 'ms | Per word: ' + avgPerWord + 'ms | ' + wordsPerSec + ' words/s';
            benchBtn.disabled = false;
        }

        sendBtn.addEventListener('click', send);
        document.getElementById('bench').addEventListener('click', benchmark);
        chatInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') send(); });

        // --- Live Echo (bidirectional streaming via /calls) ---
        let echoCallId = null;
        const echoLog = document.getElementById('echo-log');
        const echoStatus = document.getElementById('echo-status');
        const echoInput = document.getElementById('echo-input');

        async function startEcho() {
            echoStatus.textContent = 'Starting...';

            const res = await fetch('/_api/calls', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cmd: ['echo.sh'] })
            });
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            (async function readLoop() {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        echoStatus.textContent = 'Disconnected';
                        echoCallId = null;
                        break;
                    }
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (!line.startsWith('data:')) continue;
                        const json = line.slice(5).trim();
                        if (!json) continue;
                        try {
                            const msg = JSON.parse(json);
                            if (msg.event === 'started' && msg.data && msg.data.call_id) {
                                echoCallId = msg.data.call_id;
                                echoStatus.textContent = 'Connected (call: ' + echoCallId.slice(0, 8) + '...)';
                                continue;
                            }
                            if (msg.event === 'output' && msg.data) {
                                addMessage(msg.data, 'echo', echoLog);
                            }
                        } catch {}
                    }
                }
            })();
        }

        let debounceTimer = null;
        echoInput.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function() {
                if (!echoCallId) return;
                const text = echoInput.value;
                if (!text) return;
                fetch('/_api/calls/' + echoCallId + '/stdin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: { text: text } })
                });
            }, 100);
        });
    </script>
</body>
</html>
