<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Potato Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1 {
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #1e293b;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .msg {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            line-height: 1.4;
        }
        .msg.user {
            align-self: flex-end;
            background: #6366f1;
        }
        .msg.bot {
            align-self: flex-start;
            background: #1e293b;
        }
        #input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid #1e293b;
        }
        input {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
        }
        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            background: #6366f1;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #4f46e5; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>Potato Chat</h1>
    <div id="messages"></div>
    <div id="input-area">
        <input id="msg" type="text" placeholder="Type a message..." autofocus />
        <button id="send">Send</button>
        <button id="bench">Benchmark</button>
    </div>
    <script>
        const messages = document.getElementById('messages');
        const input = document.getElementById('msg');
        const sendBtn = document.getElementById('send');

        function addMessage(text, who) {
            const div = document.createElement('div');
            div.className = 'msg ' + who;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            sendBtn.disabled = true;

            const botMsg = addMessage('', 'bot');
            let words = [];

            const res = await fetch('/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cmd: ['/chat.sh'], stdin: { message: text } })
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (!line.startsWith('data:')) continue;
                    const json = line.slice(5).trim();
                    if (!json) continue;
                    try {
                        const msg = JSON.parse(json);
                        if (msg.event === 'output' && msg.data.word) {
                            words.push(msg.data.word);
                            botMsg.textContent = words.join(' ');
                            messages.scrollTop = messages.scrollHeight;
                        }
                    } catch {}
                }
            }

            sendBtn.disabled = false;
            input.focus();
        }

        async function benchmark() {
            const benchBtn = document.getElementById('bench');
            benchBtn.disabled = true;
            const statusMsg = addMessage('Benchmarking...', 'bot');

            const rounds = 20;
            let totalFirstWord = 0;
            let totalComplete = 0;
            let totalWords = 0;

            for (let r = 0; r < rounds; r++) {
                const start = performance.now();
                let firstWordTime = 0;
                let wordCount = 0;

                const res = await fetch('/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cmd: ['/bench.sh'], stdin: {} })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data:')) continue;
                        const json = line.slice(5).trim();
                        if (!json) continue;
                        try {
                            const msg = JSON.parse(json);
                            if (msg.event === 'output' && msg.data.word) {
                                wordCount++;
                                if (firstWordTime === 0) firstWordTime = performance.now() - start;
                            }
                        } catch {}
                    }
                }

                const elapsed = performance.now() - start;
                totalFirstWord += firstWordTime;
                totalComplete += elapsed;
                totalWords += wordCount;
                statusMsg.textContent = `Benchmarking... ${r + 1}/${rounds}`;
            }

            const avgFirst = (totalFirstWord / rounds).toFixed(1);
            const avgComplete = (totalComplete / rounds).toFixed(1);
            const avgPerWord = (totalComplete / totalWords).toFixed(2);
            const wordsPerSec = (totalWords / (totalComplete / 1000)).toFixed(0);

            statusMsg.textContent = [
                `${rounds} rounds, ${totalWords} words total`,
                `Avg first word: ${avgFirst}ms`,
                `Avg complete: ${avgComplete}ms`,
                `Avg per word: ${avgPerWord}ms`,
                `Throughput: ${wordsPerSec} words/s`
            ].join(' | ');

            benchBtn.disabled = false;
        }

        sendBtn.addEventListener('click', send);
        document.getElementById('bench').addEventListener('click', benchmark);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
