<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hello World</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { font-size: 3rem; margin-bottom: 2rem; }
        .calc {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1rem;
        }
        input {
            width: 80px;
            padding: 0.5rem;
            font-size: 1.2rem;
            border-radius: 4px;
            border: 1px solid #444;
            background: #16213e;
            color: #eee;
            text-align: center;
        }
        button {
            padding: 0.5rem 1rem;
            font-size: 1.2rem;
            border-radius: 4px;
            border: none;
            background: #e94560;
            color: #eee;
            cursor: pointer;
        }
        button:hover { background: #c73e54; }
        #result {
            font-size: 1.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <h1>Hello from Potato!</h1>
    <div class="calc">
        <input type="number" id="a" value="0">
        <input type="number" id="b" value="0">
    </div>
    <div class="calc">
        <button onclick="calc('add')">Add</button>
        <button onclick="calc('multiply')">Multiply</button>
    </div>
    <div id="result"></div>
    <script>
        async function calc(op) {
            const a = document.getElementById('a').value;
            const b = document.getElementById('b').value;
            document.getElementById('result').textContent = 'Calculating...';
            try {
                const res = await fetch('/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cmd: ['/calculate.sh', a, b, op] })
                });
                const text = await res.text();
                const data = JSON.parse(text);
                if (data.error) {
                    document.getElementById('result').textContent = 'Error: ' + data.error;
                } else {
                    document.getElementById('result').textContent = `Result: ${data.result}`;
                }
            } catch (e) {
                document.getElementById('result').textContent = 'Error: ' + e;
            }
        }
    </script>
</body>
</html>
