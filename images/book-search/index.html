<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta charset="utf-8">
    <title>Book Search</title>
    <link rel="stylesheet" href="/pico.min.css">
    <script src="/htmx.min.js"></script>
</head>
<body>
    <main class="container">
        <h1>Book Search</h1>
        <p><em>Search through Alice's Adventures in Wonderland by Lewis Carroll</em></p>

        <form hx-post="/render/search.sh" hx-target="#results" hx-indicator="#loading">
            <fieldset role="group">
                <input type="text" name="query" placeholder="Search for a word or phrase..." autofocus />
                <button type="submit">Search</button>
            </fieldset>
        </form>

        <p id="loading" aria-busy="true" class="htmx-indicator">Searching...</p>
        <section id="results">Type a search term and press Search.</section>
    </main>
</body>
</html>
